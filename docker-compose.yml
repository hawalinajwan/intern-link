services:
  mysql:
    image: mysql:8
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend-php/config/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongodb:
    image: mongo:7
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  php-backend:
    build:
      context: ./backend-php
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend-php:/var/www/html
    ports:
      - "8000:80"

  node-backend:
    build:
      context: ./backend-node
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      mongodb:
        condition: service_healthy
    working_dir: /app
    volumes:
      - ./backend-node:/app
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      - php-backend
      - node-backend
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "3001:3001"
    command: sh -c "npm run dev -- --hostname 0.0.0.0 --port 3001"

volumes:
  mysql-data:
  mongo-data:
